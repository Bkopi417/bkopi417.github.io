<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISS Tracker</title>

  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #000;
      color: #00ff88;
      font-family: monospace;
    }

    a {
      color: #00ffaa;
      text-decoration: none;
    }

    .container {
      max-width: 700px;
    }

    .card {
      border: 1px solid #111;
      background: #050505;
      padding: 16px;
      margin-top: 20px;
      box-shadow: 0 0 10px rgba(0, 255, 120, 0.08);
    }

    .title {
      font-size: 22px;
      margin-bottom: 14px;
      color: #00ffaa;
    }

    .row {
      margin-bottom: 8px;
    }

    .label {
      color: #888;
    }

    .value {
      color: #00ff88;
      font-weight: bold;
    }

    .small {
      color: #666;
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="container">

  <div>
    <a href="index.html">← HOME</a>
  </div>

  <div class="card">
    <div class="title">🛰 INTERNATIONAL SPACE STATION</div>

    <div class="row">
      <span class="label">LATITUDE:</span>
      <span class="value" id="lat">...</span>
    </div>

    <div class="row">
      <span class="label">LONGITUDE:</span>
      <span class="value" id="lon">...</span>
    </div>

    <div class="row">
      <span class="label">ALTITUDE:</span>
      <span class="value" id="alt">...</span>
    </div>

    <div class="row">
      <span class="label">SPEED:</span>
      <span class="value" id="speed">...</span>
    </div>

    <div class="small" id="updated">
      Updating...
    </div>
  </div>

</div>

<script>
async function updateISS() {
  try {
    const response = await fetch(
      "https://api.wheretheiss.at/v1/satellites/25544"
    );

    const data = await response.json();

    document.getElementById("lat").textContent =
      data.latitude.toFixed(4);

    document.getElementById("lon").textContent =
      data.longitude.toFixed(4);

    document.getElementById("alt").textContent =
      Math.round(data.altitude) + " km";

    document.getElementById("speed").textContent =
      Math.round(data.velocity) + " km/h";

    document.getElementById("updated").textContent =
      "LAST UPDATE: " + new Date().toLocaleTimeString("en-GB");

  } catch (error) {
    document.getElementById("updated").textContent =
      "ERROR FETCHING ISS DATA";
  }
}

updateISS();
setInterval(updateISS, 5000);
</script>

</body>
</html>
