<script>
const zones = [
  {
    label: "🇺🇸 PST",
    zone: "America/Los_Angeles",
    city: "Los Angeles",
    region: "North America",
    lat: 34.0522,
    lon: -118.2437
  },
  {
    label: "🇺🇸 EST",
    zone: "America/New_York",
    city: "New York",
    region: "North America",
    lat: 40.7128,
    lon: -74.0060
  },
  {
    label: "🌍 GMT",
    zone: "Europe/London",
    city: "London",
    region: "Europe",
    lat: 51.5072,
    lon: -0.1276
  },
  {
    label: "🇪🇺 CET",
    zone: "Europe/Berlin",
    city: "Berlin",
    region: "Europe",
    lat: 52.5200,
    lon: 13.4050
  },
  {
    label: "🇯🇵 JST",
    zone: "Asia/Tokyo",
    city: "Tokyo",
    region: "Asia",
    lat: 35.6762,
    lon: 139.6503
  },
  {
    label: "🇦🇺 AEST",
    zone: "Australia/Sydney",
    city: "Sydney",
    region: "Oceania",
    lat: -33.8688,
    lon: 151.2093
  }
];

let weatherData = {};

function formatTime(timeZone) {
  return new Date().toLocaleTimeString("en-GB", {
    timeZone,
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  });
}

function weatherIcon(code) {
  if (code === 0) return "☀️";
  if ([1, 2, 3].includes(code)) return "⛅";
  if ([45, 48].includes(code)) return "🌫️";
  if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) return "🌧️";
  if ([71, 73, 75, 77, 85, 86].includes(code)) return "❄️";
  if ([95, 96, 99].includes(code)) return "⛈️";
  return "🌡️";
}

async function fetchWeather() {
  for (const z of zones) {
    try {
      const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${z.lat}&longitude=${z.lon}` +
        `&current=temperature_2m,weather_code`;

      const response = await fetch(url);
      const data = await response.json();

      weatherData[z.label] = {
        temp: Math.round(data.current.temperature_2m),
        code: data.current.weather_code
      };
    } catch {
      weatherData[z.label] = null;
    }
  }

  updateClock();
}

function updateClock() {
  const localZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const localTime = formatTime(localZone);

  let html = `
  <div style="
    font-family: monospace;
    line-height: 1.7;
    color: #00ff88;
  ">
    <div style="margin-bottom:12px;">
      🖥️ LOCAL (${localZone}):
      <strong>${localTime}</strong>
    </div>

    <hr style="
      border:none;
      border-top:1px solid #333;
      margin:10px 0 16px;
    ">
  `;

  zones.forEach(z => {
    const weather = weatherData[z.label];

    const weatherText = weather
      ? `${weatherIcon(weather.code)} ${weather.temp}°C`
      : "...";

    html += `
    <div style="
      margin-bottom:14px;
      padding-bottom:10px;
      border-bottom:1px solid #111;
    ">
      <div>
        <strong>${z.label}</strong>:
        ${formatTime(z.zone)}
        <span style="color:#00ffaa;"> | ${weatherText}</span>
      </div>

      <div style="
        color:#888;
        font-size:12px;
        margin-top:2px;
      ">
        📍 ${z.city} · ${z.region}
      </div>

      <div style="
        color:#666;
        font-size:11px;
      ">
        LAT ${z.lat} | LON ${z.lon}
      </div>
    </div>
    `;
  });

  html += `</div>`;

  document.getElementById("days").innerHTML = html;
}

setInterval(updateClock, 1000);
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);
</script>
