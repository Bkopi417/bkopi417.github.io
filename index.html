<script>
const budapest = {
  city: "Budapest",
  zone: "Europe/Budapest",
  lat: 47.4979,
  lon: 19.0402
};

let visitorWeather = null;
let budapestWeather = null;
let visitorLocation = null;

function formatTime(timeZone) {
  return new Date().toLocaleTimeString("en-GB", {
    timeZone,
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  });
}

function weatherIcon(code) {
  if (code === 0) return "☀️";
  if ([1, 2, 3].includes(code)) return "⛅";
  if ([45, 48].includes(code)) return "🌫️";
  if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) return "🌧️";
  if ([71, 73, 75, 77, 85, 86].includes(code)) return "❄️";
  if ([95, 96, 99].includes(code)) return "⛈️";
  return "🌡️";
}

function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

  return Math.round(R * c);
}

async function getWeather(lat, lon) {
  try {

    const url =
      `https://api.open-meteo.com/v1/forecast` +
      `?latitude=${lat}` +
      `&longitude=${lon}` +
      `&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m`;

    const response = await fetch(url);
    const data = await response.json();

    return {
      temp: Math.round(data.current.temperature_2m),
      humidity: data.current.relative_humidity_2m,
      wind: Math.round(data.current.wind_speed_10m),
      code: data.current.weather_code
    };

  } catch {
    return null;
  }
}

async function init() {

  // Budapest weather
  budapestWeather = await getWeather(
    budapest.lat,
    budapest.lon
  );

  // Visitor location
  navigator.geolocation.getCurrentPosition(

    async position => {

      visitorLocation = {
        lat: position.coords.latitude,
        lon: position.coords.longitude
      };

      visitorWeather = await getWeather(
        visitorLocation.lat,
        visitorLocation.lon
      );

      updateClock();
    },

    () => {
      updateClock();
    }
  );
}

function renderWeather(weather) {

  if (!weather) {
    return "...";
  }

  return `
    ${weatherIcon(weather.code)} ${weather.temp}°C
    <span style="color:#666;">
      | 💧 ${weather.humidity}%
      | 🌬 ${weather.wind} km/h
    </span>
  `;
}

function updateClock() {

  const localZone =
    Intl.DateTimeFormat().resolvedOptions().timeZone;

  const localTime = formatTime(localZone);

  const budapestTime = formatTime(budapest.zone);

  let distanceText = "UNKNOWN";

  if (visitorLocation) {

    distanceText =
      distanceKm(
        budapest.lat,
        budapest.lon,
        visitorLocation.lat,
        visitorLocation.lon
      ) + " km";
  }

  const html = `
  <div style="
    font-family: monospace;
    line-height: 1.8;
    color: #00ff88;
  ">

    <div>
      🇪🇺 CET / BUDAPEST:
      <strong>${budapestTime}</strong>
    </div>

    <div style="
      color:#888;
      font-size:12px;
      margin-left:18px;
    ">
      📍 Budapest, Hungary
    </div>

    <div style="
      color:#00ffaa;
      font-size:12px;
      margin-left:18px;
    ">
      ${renderWeather(budapestWeather)}
    </div>

    <hr style="
      border:none;
      border-top:1px solid #222;
      margin:10px 0;
    ">

    <div>
      🖥️ VISITOR (${localZone}):
      <strong>${localTime}</strong>
    </div>

    <div style="
      color:#888;
      font-size:12px;
      margin-left:18px;
    ">
      🌍 Distance from Budapest:
      ${distanceText}
    </div>

    <div style="
      color:#00ffaa;
      font-size:12px;
      margin-left:18px;
    ">
      ${renderWeather(visitorWeather)}
    </div>

  </div>
  `;

  document.getElementById("days").innerHTML = html;
}

setInterval(updateClock, 1000);

init();
setInterval(init, 10 * 60 * 1000);
</script>
