  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    const chars = "アァイィウヴエェオカガキギクグケゲコゴサザシジスズセゼソゾタダチッヂヅテデトドナニヌネノハバパヒビピフブプヘベペホボポマミムメモヤャユュヨョラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 16;
    let columns = Math.floor(width / fontSize);
    let drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.06)";
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = "#00ff41";
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        ctx.fillText(text, x, y);

        if (y > height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 33);

    window.addEventListener("resize", () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      columns = Math.floor(width / fontSize);
      drops = Array(columns).fill(1);
    });
  </script>

	<script>
    function updateClock() {
        const now = new Date();

        // Local time
        let hours = now.getHours();
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();
        hours = hours < 10 ? "0" + hours : hours;
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        const localTime = `${hours}:${minutes}:${seconds}`;

        // UTC time
        let utcHours = now.getUTCHours();
        let utcMinutes = now.getUTCMinutes();
        let utcSeconds = now.getUTCSeconds();
        utcHours = utcHours < 10 ? "0" + utcHours : utcHours;
        utcMinutes = utcMinutes < 10 ? "0" + utcMinutes : utcMinutes;
        utcSeconds = utcSeconds < 10 ? "0" + utcSeconds : utcSeconds;
        const utcTime = `${utcHours}:${utcMinutes}:${utcSeconds}`;

        // Get local timezone name
        const timeZoneName = Intl.DateTimeFormat().resolvedOptions().timeZone;

        // Decorated output
        const clockElement = document.getElementById('days');
        if (clockElement) {
            clockElement.innerHTML = `
                <div style="font-family: monospace; line-height: 1.6;">
                    <span style="color: #00ff00;">🕒 Local (${timeZoneName}):</span> <strong>${localTime}</strong><br/>
                    <span style="color: #00bfff;">🌍 UTC:</span> <strong>${utcTime}</strong>
                </div>
            `;
        }
    }

    setInterval(updateClock, 1000);
    updateClock();
	</script>
