function base58Decode(str) {
    let num = 0n;

    for (const char of str) {
        const index = BASE58_ALPHABET.indexOf(char);

        if (index === -1) {
            throw new Error("Invalid Base58 character: " + char);
        }

        num = num * 58n + BigInt(index);
    }

    let hex = num.toString(16);

    if (hex.length % 2) {
        hex = "0" + hex;
    }

    const bytes = new Uint8Array(
        hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16))
    );

    return new TextDecoder().decode(bytes);
}

function rot13(str) {
    return str.replace(/[a-zA-Z]/g, function(char) {
        const code = char.charCodeAt(0);
        const base = code >= 65 && code <= 90 ? 65 : 97;

        return String.fromCharCode(
            ((code - base + 13) % 26) + base
        );
    });
}

function decodeWord(encodedWord) {
    const base64Decoded = atob(encodedWord);
    const rotDecoded = rot13(base64Decoded);

    return base58Decode(rotDecoded);
}

function getRandomWord() {
    const randomIndex = Math.floor(Math.random() * encodedWordList.length);
    return decodeWord(encodedWordList[randomIndex]);
}

function toLeetSpeak(word) {
    const leetMap = {
        a: "4",
        e: "3",
        i: "1",
        o: "0",
        s: "5",
        t: "7"
    };

    return word.replace(/[aeiost]/gi, function(match) {
        return leetMap[match.toLowerCase()] || match;
    });
}

function getRandomSpecialCharacter() {
    const specialCharacters = "@%/+-!";
    const randomIndex = Math.floor(Math.random() * specialCharacters.length);

    return specialCharacters[randomIndex];
}

function generatePasswords() {
    const passwords = [];

    for (let i = 0; i < 10; i++) {
        const word1 = getRandomWord();
        const word2 = getRandomWord();

        const leetWord1 = toLeetSpeak(word1);
        const leetWord2 = toLeetSpeak(word2);

        const specialCharacter = getRandomSpecialCharacter();

        passwords.push(leetWord1 + specialCharacter + leetWord2);
    }

    return passwords;
}

function renderPasswords() {
    const passwords = generatePasswords();
    const passwordsOutput = document.getElementById("passwordsOutput");

    passwordsOutput.textContent = "Generated passwords:\n\n";

    for (let i = 0; i < passwords.length; i++) {
        passwordsOutput.textContent += `${i + 1}. ${passwords[i]}\n`;
    }
}
